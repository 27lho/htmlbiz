<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Cart — Mystic Connections</title>
    <meta name="description" content="Your cart and checkout." />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a class="logo" href="index.html"><img src="logo.svg" alt="Mystic Connections logo"/></a>
        <nav class="main-nav">
          <a href="index.html">Home</a>
          <a href="gallery.html">Gallery</a>
          <a href="pricing.html">Pricing</a>
          <a href="contact.html">Contact</a>
          <a href="products.html">Shop</a>
          <a href="cart.html" class="cart-link">Cart (<span id="cart-count">0</span>)</a>
        </nav>
      </div>
    </header>

    <main class="container">
      <h1>Your Cart</h1>
      <div id="cart-container"></div>

      <section id="checkout" style="margin-top:20px;">
        <h2>Checkout</h2>
        <div id="cart-total" style="margin-bottom:12px;font-weight:700">Total: $0.00</div>
        <div id="paypal-buttons"></div>
        <p class="muted">Note: replace the PayPal `client-id` in the script tag with your own merchant client ID.</p>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container footer-inner">© Mystic Connections</div>
    </footer>

    <!-- PayPal SDK (replace YOUR_PAYPAL_CLIENT_ID below) -->
    <script src="https://www.paypal.com/sdk/js?client-id=YOUR_PAYPAL_CLIENT_ID&currency=USD"></script>
    <script src="cart.js"></script>
    <script src="main.js"></script>
  </body>
</html>
